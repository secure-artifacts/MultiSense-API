name: CodeQL (Swift macOS)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    runs-on: macos-latest

    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Init CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      # 👇 关键：手动构建
      - name: Build (Xcode)
        run: |
          xcodebuild \
            -scheme YourAppName \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
