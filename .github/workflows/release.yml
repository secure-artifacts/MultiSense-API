name: Build and Release macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild \
            -scheme YourAppName \
            -configuration Release \
            -derivedDataPath build

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme YourAppName \
            -configuration Release \
            -archivePath build/YourApp.xcarchive

      - name: Export App
        run: |
          mkdir -p dist
          cp -R build/YourApp.xcarchive/Products/Applications/*.app dist/

      - name: Zip
        run: |
          cd dist
          zip -r YourApp.zip *.app

      # 👇 就加在这里（关键位置）
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*.zip'

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
