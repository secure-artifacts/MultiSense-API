name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest

    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project "MultiSense API.xcodeproj" \
            -scheme "MultiSense API" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/MultiSenseAPI.xcarchive" \
            CODE_SIGN_IDENTITY="-"

      - name: Build PKG
        run: |
          mkdir -p dist

          APP_PATH="$RUNNER_TEMP/MultiSenseAPI.xcarchive/Products/Applications/MultiSense API.app"

          pkgbuild \
            --component "$APP_PATH" \
            --install-location "/Applications" \
            "$GITHUB_WORKSPACE/dist/MultiSense-API-macOS.pkg"

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
