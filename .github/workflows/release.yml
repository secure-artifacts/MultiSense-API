name: Build and Release macOS App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # 👇 推荐：先 clean build，避免缓存问题
      - name: Build
        run: |
          xcodebuild \
            -scheme YourAppName \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme YourAppName \
            -configuration Release \
            -archivePath build/YourApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Export App
        run: |
          mkdir -p dist
          cp -R build/YourApp.xcarchive/Products/Applications/*.app dist/

      - name: Zip App
        run: |
          cd dist
          APP_NAME=$(ls *.app | head -n 1)
          zip -r "${APP_NAME%.app}.zip" "$APP_NAME"

      # 👇 Attestation（基于 zip 文件）
      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
